_include_models:
- models/gemma_2_9b_it.yaml
- models/llama3_aloe_8b_alpha.yaml
calibrated: true
_include_calibration: calibration/adaptive_temperature_1000samples.yaml
wagering_method:
  name: router_dc
  config:
    encoder_model_name: microsoft/mdeberta-v3-base
    tokenizer_use_fast: false
    hidden_state_layers:
    - -1
    max_seq_length: 512
    learning_rate: 1e-6
    lr_decay_factor: 1
    lr_decay_steps: 100
    temperature: 1.0
    grad_clip_norm: 1.0
    weight_decay: 0.01
    freeze_encoder: false
    pubmedqa_strip_context: true
    similarity_function: cos
    top_k: 3
    last_k: 3
    min_pos_p: 0.01
    neg_mask_threshold: 0.5
    device: cuda:0
aggregation:
  name: weighted_linear_pooling
  config: {}
option_tokens:
- A
- B
- C
- D
_include_datasets:
- datasets/mmlu_full.yaml
- datasets/medmcqa.yaml
datasets:
- train_split: auxiliary_train
- train_split: train
num_epochs: 50
checkpoint_base_dir: /common/users/yl2310/MultiLLMs/checkpoints/20260420_221900/repeat_0000
save_every: 100
training_batch_size: 50
wager_score_plot_every: 500
auto_resume: false
balance_training_datasets: true
shuffle_data: true
shuffle_seed: 18
early_stopping_patience: 5
early_stopping_criterion: validation
report_to_wandb: false
wandb_project: multi-llm-wagering
wandb_entity: null
wandb_name: router_dc_4models
_include_test_datasets:
- datasets/mmlu_full.yaml
- datasets/medmcqa.yaml
test_datasets:
- display_name: mmlu_full_test
  eval_split: test
- display_name: medmcqa_test
  eval_split: validation
_include_ood_datasets:
- datasets/arc_challenge.yaml
- datasets/forecastqa.yaml
ood_datasets:
- display_name: arc_challenge_ood
  eval_split: test
- display_name: forecastqa_ood
  eval_split: test
dataset_split_seed: 42
