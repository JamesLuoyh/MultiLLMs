# Full end-to-end pipeline configuration for testing weighted_score_wagers
# Combines training and evaluation in a single config file
# Each model has its own router that outputs a single scalar wager
# Wagers are normalized via softmax to sum to 1
# Uses weighted score wagering mechanism for training

# ============================================================================
# SHARED CONFIGURATION (used by both training and evaluation)
# ============================================================================

# Models (shared between training and evaluation)
# Model 0: GPU 0, Model 1: GPU 1
_include_models:
  - models/gemma_2_9b_it.yaml
  - models/llama3_aloe_8b_alpha.yaml

# Wagering method (must match between training and evaluation)
wagering_method:
  name: weighted_score_wagers
  config:
    common_hidden_dim: 4096  # Common dimension for projected hidden states
    hidden_layers: [512, 256]  # MLP hidden layer sizes for each router
    learning_rate: 1e-5  # Learning rate for router optimizers
    temperature: 2.0  # Temperature for softmax (higher = softer, prevents one model from dominating)
    grad_clip_norm: 1.0  # Gradient clipping norm (prevents gradient explosion)
    normalize_hidden_states: true  # L2 normalize hidden states before projection (prevents scale imbalance)
    scoring_rule: logarithmic  # Scoring rule for weighted score wagering
    device: cuda:0  # Device to run router on (will use GPU 2 when CUDA_VISIBLE_DEVICES=2,3)

# Aggregation function (must match between training and evaluation)
aggregation:
  name: weighted_linear_pooling
  config: {}

# Common options
option_tokens: ["A", "B", "C", "D"]
cache_path: /common/users/yl2310/MultiLLMs/cache

# ============================================================================
# TRAINING CONFIGURATION
# ============================================================================

# Training datasets
_include_datasets:
  - datasets/mmlu.yaml
  - datasets/medmcqa.yaml

# Override dataset-specific settings for training
datasets:
  - train_split: train
    size: 10  # Match cached dataset size from test_centralized_cache.yaml
  - train_split: train
    size: 10  # Match cached dataset size from test_centralized_cache.yaml

# Training parameters
num_epochs: 5  # Small number of epochs for testing
# Base directory for checkpoints (unique subdirectory will be generated)
checkpoint_base_dir: /common/users/yl2310/MultiLLMs/checkpoints
save_every: 10  # Save checkpoint every 10 batches
training_batch_size: 10  # Batch size for training loop (match dataset size)

# Training options
auto_resume: true  # Automatically resume from latest checkpoint if available
shuffle_data: true  # Shuffle training data across datasets
shuffle_seed: 42  # Random seed for shuffling
early_stopping_patience: 10  # Stop training if no improvement for 10 epochs

# Wandb logging (optional)
report_to_wandb: true
wandb_project: multi-llm-wagering
wandb_entity: null
wandb_name: null

# ============================================================================
# EVALUATION CONFIGURATION
# ============================================================================

# Checkpoint path will be automatically set to {checkpoint_dir}/final
# But you can override it here if needed
# checkpoint_path: ./workdir/wagering_checkpoints/final

# Test datasets
_include_test_datasets:
  - datasets/mmlu.yaml
  - datasets/medmcqa.yaml

# Override dataset-specific settings for evaluation
test_datasets:
  - display_name: mmlu_test
    eval_split: test
    size: 10  # Match cached dataset size for testing
  - display_name: medmcqa_test
    eval_split: validation  # MedMCQA test split has no labels, use validation
    size: 10  # Match cached dataset size for testing

# OOD dataset
_include_ood_dataset: datasets/arc_easy.yaml

# Override OOD dataset-specific settings
ood_dataset:
  display_name: arc_easy_ood
  eval_split: test
  size: 10  # Match cached dataset size for testing
