_include_models:
  - ../models/gemma_2_9b_it.yaml
  - ../models/llama3_aloe_8b_alpha.yaml
  - ../models/llama3_1_8b_instruct.yaml

aggregation:
  name: weighted_linear_pooling
  config: {}

option_tokens: [A, B, C, D]

checkpoint_base_dir: /research/projects/ecoai/abcdefg/MultiLLMs/checkpoints
save_every: 100

# Trainer loop batch size. Keep aligned with per-phase dataset batch_size for clarity.
training_batch_size: 8
shuffle_data: true
shuffle_seed: 18 #18 #42
dataset_split_seed: 42
report_to_wandb: true
wandb_project: multi-llm-wagering
wandb_entity: null
wandb_name: phase_shift_model_deletion

test_datasets: []

phase_shift:
  rolling_window_batches: 100
  baseline_window_batches: 200
  output_dir: /research/projects/ecoai/abcdefg/MultiLLMs/phase_shift_outputs/scenario_model_deletion_cache_2000_200batches_restart
  evaluate_after_phase2: false
  metrics: [accuracy, ece, kendall_tau, best_model_mrr, brier_d_regret]
  methods:
    - name: centralized_wagers
      config:
        hidden_dim: 4096
        hidden_layers: [512, 256]
        learning_rate: 5e-5
        temperature: 2.0
        normalize_hidden_states: false
        device: cuda:2
    - name: mse_br_wagers_v2
      config:
        common_hidden_dim: 4096
        hidden_layers: [512, 256]
        hidden_state_layers: [-1]
        learning_rate: 5e-5
        temperature: 2.0
        normalize_hidden_states: false
        device: cuda:2
    - name: mse_br_wagers_v3
      config:
        common_hidden_dim: 4096
        hidden_layers: [512, 256]
        hidden_state_layers: [-1]
        learning_rate: 5e-5
        temperature: 2.0
        normalize_hidden_states: false
        device: cuda:2
    # # - name: equal_wagers
    # #   config:
    # #     device: cuda:1
    # # - name: packllm_perplexity_wagers
    # #   config:
    # #     tau: 1.0
    # #     epsilon: 1.0e-12
    # #     device: cuda:0
    # # - name: kl_uniform_wagers
    # #   config:
    # #     confidence_epsilon: 1.0e-8
    # #     device: cuda:1
    - name: nirt_router
      config:
        encoder_model_name: bert-base-uncased
        tokenizer_use_fast: false
        max_seq_length: 512
        hidden_state_layers: [-1]  # Per-model layer picks, aligned with _include_models order
        learning_rate: 1e-04
        lr_decay_factor: 1
        lr_decay_steps: 100
        temperature: 1.0
        grad_clip_norm: 1.0
        weight_decay: 0.01
        freeze_encoder: true
        pubmedqa_strip_context: true
        knowledge_dim: 25
        model_embedding_dim: 256
        router_hidden_dim: 512
        router_dropout: 0.1
        bce_loss_weight: 1.0
        mixture_ce_weight: 0.25
        param_l2_weight: 1e-4
        device: cuda:2
    - name: router_dc
      config:
        encoder_model_name: microsoft/mdeberta-v3-base
        tokenizer_use_fast: false
        hidden_state_layers: [-1]  # Per-model layer picks, aligned with _include_models order
        max_seq_length: 512
        learning_rate: 1e-7
        lr_decay_factor: 1
        lr_decay_steps: 100
        micro_batch_size: 30
        temperature: 2.0
        grad_clip_norm: 0.25
        weight_decay: 0.001
        freeze_encoder: false
        pubmedqa_strip_context: true
        similarity_function: cos
        top_k: 3
        last_k: 3
        min_pos_p: 0.01
        neg_mask_threshold: 0.5
        device: cuda:3
    - name: route_llm_bert
      config:
        bert_model_name: bert-base-uncased
        max_seq_length: 512
        hidden_state_layers: [-1]  # Per-model layer picks, aligned with _include_models order
        learning_rate: 5e-5
        lr_decay_factor: 1
        lr_decay_steps: 100
        temperature: 2.0
        grad_clip_norm: 1.0
        weight_decay: 0.01
        freeze_bert: false
        pubmedqa_strip_context: false
        router_dropout: 0.1
        ranking_loss_weight: 0.0
        ranking_margin: 0.1
        device: cuda:3

  phase1:
    num_epochs: 1
    shuffle_data: true
    shuffle_seed: 2026
    # Cap training-loop batches (optimizer steps) for this phase; omit for full pass.
    # max_batches: 200
    datasets:
      - name: openlifescienceai/medmcqa
        display_name: medmcqa
        text_column: question
        label_column: cop
        train_split: train
        batch_size: 5
        max_batches: 2000
        max_prompt_tokens: 1200
        load_from_disk: false
        trust_remote_code: false
        instruct: false
        prompt: "Return the label of the correct answer for the question below.\n\nQuestion: {question}\nChoices:\n{choices}\nAnswer:"
        description: ""
  phase2:
    num_epochs: 1
    shuffle_data: true
    shuffle_seed: 2027
    datasets:
      - name: openlifescienceai/medmcqa
        display_name: medmcqa
        text_column: question
        label_column: cop
        train_split: train
        batch_size: 5
        max_batches: 200
        max_prompt_tokens: 1200
        load_from_disk: false
        trust_remote_code: false
        instruct: false
        prompt: "Return the label of the correct answer for the question below.\n\nQuestion: {question}\nChoices:\n{choices}\nAnswer:"
        description: ""
    frozen_model_indices: [2]
    inactive_model_indices: [2]