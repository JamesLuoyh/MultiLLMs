_include_models:
  - ../models/llama3_aloe_8b_alpha.yaml
  - ../models/llama3_aloe_8b_alpha.yaml

aggregation:
  name: weighted_linear_pooling
  config: {}

option_tokens: ["YES", "NO"]

cache_path: /common/users/yl2310/MultiLLMs/cache
checkpoint_base_dir: /common/users/yl2310/MultiLLMs/checkpoints
save_every: 100
# Trainer loop batch size. Keep aligned with per-phase dataset batch_size for clarity.
training_batch_size: 100
shuffle_data: true
shuffle_seed: 18 #18 #42
dataset_split_seed: 42
report_to_wandb: true
wandb_project: multi-llm-wagering
wandb_entity: null
wandb_name: phase_shift_pubmedqa_policy

# Shared dataset fields for both phases.
pubmedqa_dataset_common: &pubmedqa_dataset_common
  name: qiaojin/PubMedQA
  source_config_name: pqa_artificial
  source_split: train
  train_target_split: train_val
  split_ratios: [0.6, 0.2, 0.2]
  batch_size: 8
  local_files_only: false

# Prompt templates reused across phases.
pubmedqa_phase1_prompt: &pubmedqa_phase1_prompt "Question:\n{question}\nYou are an expert in medical science and you have classified access to the following context.\nContext:\n{context}\nAnswer with YES or NO. Answer:"
pubmedqa_phase1_prompt_without_context: &pubmedqa_phase1_prompt_without_context "Question:\n{question}\nAnswer with YES or NO. Answer:"
pubmedqa_phase2_prompt: &pubmedqa_phase2_prompt "Question:\n{question}\nYou are an expert in medical science and you have classified access to the following context.\nContext:\n{context}\nLong Answer:\n{long_answer}\nAnswer with YES or NO. Answer:"

test_datasets:
  []

phase_shift:
  rolling_window_batches: 10
  evaluate_after_phase2: false
  metrics: [accuracy, ece, kendall_tau, best_model_mrr, brier_d_regret]
  methods:
    - name: centralized_wagers
      config:
        hidden_dim: 4096
        hidden_layers: [512, 256]
        hidden_state_layers: [-1]
        learning_rate: 5e-6
        temperature: 2.0
        normalize_hidden_states: false
        device: cuda:0
    - name: mse_br_wagers_v2
      config:
        common_hidden_dim: 4096
        hidden_layers: [512, 256]
        hidden_state_layers: [-1]
        learning_rate: 5e-5
        temperature: 2.0
        normalize_hidden_states: false
        device: cuda:0
    - name: mse_br_wagers_v3
      config:
        common_hidden_dim: 4096
        hidden_layers: [512, 256]
        hidden_state_layers: [-1]
        learning_rate: 5e-5
        temperature: 2.0
        normalize_hidden_states: false
        device: cuda:0
  phase1:
    num_epochs: 1
    datasets:
      - <<: *pubmedqa_dataset_common
        display_name: pubmedqa_phase1
        # Mirrors examples/configs/wagering_training/datasets/pubmedqa_full.yaml
        prompt: *pubmedqa_phase1_prompt
        prompt_without_context: *pubmedqa_phase1_prompt_without_context
    pubmedqa_context_policy: single_with_context
  phase2:
    num_epochs: 1
    datasets:
      - <<: *pubmedqa_dataset_common
        display_name: pubmedqa_phase2
        # With dual policy, one model receives context-only and another context+long-answer.
        # For exactly 2 models, only context-only and context+long-answer routes are used.
        # The reduced route is only used when there are more than 2 models.
        prompt: *pubmedqa_phase2_prompt
    pubmedqa_context_policy: dual_context_and_long_answer
