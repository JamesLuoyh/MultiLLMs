_include_models:
  - ../models/llama3_aloe_8b_alpha.yaml
  - ../models/llama3_aloe_8b_alpha.yaml
  - ../models/llama3_aloe_8b_alpha.yaml
  - ../models/llama3_aloe_8b_alpha.yaml

aggregation:
  name: weighted_linear_pooling
  config: {}

option_tokens: ["YES", "NO"]

cache_path: /research/projects/ecoai/abcdefg/MultiLLMs/wagering_model_logits_states_caches
checkpoint_base_dir: /research/projects/ecoai/abcdefg/MultiLLMs/checkpoints
save_every: 100
# Trainer loop batch size. Keep aligned with per-phase dataset batch_size for clarity.
training_batch_size: 100
shuffle_data: true
shuffle_seed: 18 #18 #42
dataset_split_seed: 42
report_to_wandb: true
wandb_project: multi-llm-wagering
wandb_entity: null
wandb_name: phase_shift_pubmedqa_policy_2v1_no_long_answer

# Shared dataset fields for both phases.
pubmedqa_dataset_common: &pubmedqa_dataset_common
  name: qiaojin/PubMedQA
  source_config_name: pqa_artificial
  source_split: train
  train_target_split: train_val
  split_ratios: [0.6, 0.2, 0.2]
  batch_size: 8
  local_files_only: false

# Prompt templates reused across phases (no long answer in either phase).
pubmedqa_with_context_prompt: &pubmedqa_with_context_prompt "Question:\n{question}\nYou are an expert in medical science and you have classified access to the following context.\nContext:\n{context}\nAnswer with YES or NO. Answer:"
pubmedqa_without_context_prompt: &pubmedqa_without_context_prompt "Question:\n{question}\nAnswer with YES or NO. Answer:"

test_datasets:
  []

phase_shift:
  rolling_window_batches: 100
  evaluate_after_phase2: false
  # For identical base models under mixed-context PubMedQA routing, compute
  # perplexity once per unique prompt variant and reuse across repeated slots.
  reuse_prompt_perplexities_for_identical_models: true
  output_dir: /research/projects/ecoai/abcdefg/MultiLLMs/phase_shift_outputs/scenario_pubmedqa_policy_shift_2v1
  metrics: [accuracy, ece, kendall_tau, best_model_mrr, brier_d_regret]
  methods:
    - name: centralized_wagers
      config:
        hidden_dim: 4096
        hidden_layers: [512, 256]
        hidden_state_layers: [-1]
        learning_rate: 5e-6
        temperature: 2.0
        normalize_hidden_states: false
        device: cuda:2
    - name: mse_br_wagers_v2
      config:
        common_hidden_dim: 4096
        hidden_layers: [512, 256]
        hidden_state_layers: [-1]
        learning_rate: 5e-5
        temperature: 2.0
        normalize_hidden_states: false
        device: cuda:2
    - name: mse_br_wagers_v3
      config:
        common_hidden_dim: 4096
        hidden_layers: [512, 256]
        hidden_state_layers: [-1]
        learning_rate: 5e-5
        temperature: 2.0
        normalize_hidden_states: false
        device: cuda:2
    - name: equal_wagers
      config:
        device: cuda:1
    - name: packllm_perplexity_wagers
      config:
        tau: 1.0
        epsilon: 1.0e-12
        device: cuda:2
    - name: kl_uniform_wagers
      config:
        confidence_epsilon: 1.0e-8
        device: cuda:3
    - name: nirt_router
      config:
        encoder_model_name: bert-base-uncased
        tokenizer_use_fast: false
        max_seq_length: 512
        hidden_state_layers: [-1]  # Per-model layer picks, aligned with _include_models order
        learning_rate: 1e-04
        lr_decay_factor: 1
        lr_decay_steps: 100
        temperature: 1.0
        grad_clip_norm: 1.0
        weight_decay: 0.01
        freeze_encoder: true
        pubmedqa_strip_context: true
        knowledge_dim: 25
        model_embedding_dim: 256
        router_hidden_dim: 512
        router_dropout: 0.1
        bce_loss_weight: 1.0
        mixture_ce_weight: 0.25
        param_l2_weight: 1e-4
        device: cuda:3
    - name: router_dc
      config:
        encoder_model_name: microsoft/mdeberta-v3-base
        tokenizer_use_fast: false
        hidden_state_layers: [-1]  # Per-model layer picks, aligned with _include_models order
        max_seq_length: 512
        learning_rate: 1e-6
        micro_batch_size: 25
        lr_decay_factor: 1
        lr_decay_steps: 100
        temperature: 2.0
        grad_clip_norm: 1.0
        weight_decay: 0.01
        freeze_encoder: false
        pubmedqa_strip_context: true
        similarity_function: cos
        top_k: 3
        last_k: 3
        min_pos_p: 0.01
        neg_mask_threshold: 0.5
        device: cuda:0
    - name: route_llm_bert
      config:
        bert_model_name: bert-base-uncased
        max_seq_length: 512
        hidden_state_layers: [-1]  # Per-model layer picks, aligned with _include_models order
        learning_rate: 5e-5
        lr_decay_factor: 1
        lr_decay_steps: 100
        temperature: 2.0
        grad_clip_norm: 1.0
        weight_decay: 0.01
        freeze_bert: false
        pubmedqa_strip_context: true
        router_dropout: 0.1
        ranking_loss_weight: 0.0
        ranking_margin: 0.1
        device: cuda:2
  phase1:
    num_epochs: 1
    datasets:
      - <<: *pubmedqa_dataset_common
        display_name: pubmedqa_phase1_3_with_context_1_without_context
        # Use single_with_context policy but flip prompt roles:
        # one privileged model gets prompt_without_context, the other 3 receive context.
        prompt: *pubmedqa_with_context_prompt
        prompt_without_context: *pubmedqa_with_context_prompt
    pubmedqa_context_policy: single_with_context
  phase2:
    num_epochs: 1
    datasets:
      - <<: *pubmedqa_dataset_common
        display_name: pubmedqa_phase2_1_with_context_3_without_context
        # Standard single_with_context routing: one model gets context, three do not.
        prompt: *pubmedqa_with_context_prompt
        prompt_without_context: *pubmedqa_without_context_prompt
    pubmedqa_context_policy: single_with_context
