_include_models:
  - ../models/gemma_2_9b_it.yaml
  - ../models/llama3_aloe_8b_alpha.yaml
  - ../models/llama3_1_8b_instruct.yaml

aggregation:
  name: weighted_linear_pooling
  config: {}

option_tokens: [A, B, C, D]

cache_path: /common/users/yl2310/MultiLLMs/cache
checkpoint_base_dir: /common/users/yl2310/MultiLLMs/checkpoints
save_every: 100
# Trainer loop batch size. Keep aligned with per-phase dataset batch_size for clarity.
training_batch_size: 8
shuffle_data: true
shuffle_seed: 18 #18 #42
dataset_split_seed: 42
report_to_wandb: true
wandb_project: multi-llm-wagering
wandb_entity: null
wandb_name: phase_shift_model_addition_mse

test_datasets: []

phase_shift:
  rolling_window_batches: 20
  evaluate_after_phase2: false
  metrics: [accuracy, ece, kendall_tau, best_model_mrr, brier_d_regret]
  methods:
    - name: mse_br_wagers_v2
      config:
        common_hidden_dim: 4096
        hidden_layers: [512, 256]
        hidden_state_layers: [-1]
        learning_rate: 1e-5
        temperature: 2.0
        normalize_hidden_states: true
        device: cuda:0
    - name: mse_br_wagers_v3
      config:
        common_hidden_dim: 4096
        hidden_layers: [512, 256]
        hidden_state_layers: [-1]
        learning_rate: 1e-5
        temperature: 2.0
        normalize_hidden_states: true
        device: cuda:0
  phase1:
    num_epochs: 3
    datasets:
      - name: cais/mmlu
        display_name: mmlu_phase1
        train_split: dev
        size: 1000
        batch_size: 8
        local_files_only: false
    frozen_model_indices: [2]
    inactive_model_indices: [2]
    validation_split_ratio: 0.0
  phase2:
    num_epochs: 3
    datasets:
      - name: medmcqa
        display_name: medmcqa_phase2
        train_split: train
        size: 1000
        batch_size: 8
        local_files_only: false
    frozen_model_indices: []
    inactive_model_indices: []
    validation_split_ratio: 0.0
