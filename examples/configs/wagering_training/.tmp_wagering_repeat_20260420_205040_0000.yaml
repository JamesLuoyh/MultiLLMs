_include_models:
- models/gemma_2_9b_it.yaml
- models/llama3_aloe_8b_alpha.yaml
calibrated: true
_include_calibration: calibration/adaptive_temperature_1000samples.yaml
wagering_method:
  name: route_llm_bert
  config:
    bert_model_name: bert-base-uncased
    max_seq_length: 512
    hidden_state_layers:
    - -1
    learning_rate: 5e-5
    lr_decay_factor: 1
    lr_decay_steps: 100
    temperature: 2.0
    grad_clip_norm: 1.0
    weight_decay: 0.01
    freeze_bert: false
    pubmedqa_strip_context: true
    router_dropout: 0.1
    ranking_loss_weight: 0.0
    ranking_margin: 0.1
    device: cuda:0
aggregation:
  name: weighted_linear_pooling
  config: {}
option_tokens:
- A
- B
- C
- D
_include_datasets:
- datasets/mmlu_full.yaml
- datasets/medmcqa.yaml
datasets:
- train_split: auxiliary_train
- train_split: train
num_epochs: 50
checkpoint_base_dir: /common/users/yl2310/MultiLLMs/checkpoints/20260420_205040/repeat_0000
save_every: 100
training_batch_size: 100
wager_score_plot_every: 500
auto_resume: false
balance_training_datasets: true
shuffle_data: true
shuffle_seed: 18
early_stopping_patience: 5
early_stopping_criterion: validation
report_to_wandb: false
wandb_project: multi-llm-wagering
wandb_entity: null
wandb_name: nirt_router_4models
_include_test_datasets:
- datasets/mmlu_full.yaml
- datasets/medmcqa.yaml
test_datasets:
- display_name: mmlu_full_test
  eval_split: test
- display_name: medmcqa_test
  eval_split: validation
_include_ood_datasets:
- datasets/arc_challenge.yaml
- datasets/forecastqa.yaml
ood_datasets:
- display_name: arc_challenge_ood
  eval_split: test
- display_name: forecastqa_ood
  eval_split: test
dataset_split_seed: 42
