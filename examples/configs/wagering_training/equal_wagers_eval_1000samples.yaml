# Evaluation configuration for equal wagers on MMLU, MedMCQA, and ARC Easy with 1000 samples each
# No training is necessary for equal wagers

# Include model configs (must match training)
_include_models:
  - models/gemma_2_9b_it.yaml
  - models/llama3_aloe_8b_alpha.yaml
  - models/llama3_1_8b_instruct.yaml
  - models/biomistral_7b.yaml
# Checkpoint path (for equal_wagers, this can be a dummy path since no training is needed)
checkpoint_path: /common/users/yl2310/MultiLLMs/checkpoints/dummy_equal_wagers

# Wagering method - equal wagers (no trainable parameters)
wagering_method:
  name: equal_wagers
  config: {}

# Aggregation function
aggregation:
  name: weighted_linear_pooling
  config: {}

# ============================================================================
# TRAINING CONFIGURATION
# ============================================================================

# # Training datasets
# _include_datasets:
#   - datasets/mmlu.yaml
#   - datasets/medmcqa.yaml

# # Override dataset-specific settings for training
# datasets:
#   - train_split: train
#   - train_split: train

# # Training parameters
# num_epochs: 1  # Default: 100 epochs
# # Base directory for checkpoints (unique subdirectory will be generated)
# checkpoint_base_dir: /common/users/yl2310/MultiLLMs/checkpoints
# save_every: 100  # Save checkpoint every 100 batches
# training_batch_size: 100  # Batch size for training loop (different from batch size for collecting hidden states)

# # Training options
# auto_resume: false  # Automatically resume from latest checkpoint if available
# shuffle_data: true  # Shuffle training data across datasets
# shuffle_seed: 42  # Random seed for shuffling (will be overridden by sweep)
# early_stopping_patience: 10  # Stop training if no improvement for 10 epochs (default: 10)
# validation_split_ratio: 0.1  # 10% of data for validation set (for early stopping)

# Wandb logging
report_to_wandb: true
wandb_project: multi-llm-wagering
wandb_entity: null
wandb_name: null

# Include test dataset configs
_include_test_datasets:
  - datasets/mmlu.yaml
  - datasets/medmcqa.yaml

# Override dataset-specific settings for evaluation with 1000 samples each
test_datasets:
  - display_name: mmlu_test
    eval_split: test
  - display_name: medmcqa_test
    eval_split: validation  # MedMCQA test split has no labels, use validation
# Include OOD dataset config
_include_ood_dataset: datasets/arc_challenge.yaml

# Override OOD dataset-specific settings with 1000 samples
ood_dataset:
  display_name: arc_challenge_ood
  eval_split: test

# Evaluation parameters
option_tokens: ["A", "B", "C", "D"]

# Evaluation checkpoint/resume (set to false to start fresh)
resume_eval: false  # Set to true to resume from checkpoint

# Paths
cache_path: /common/users/yl2310/MultiLLMs/cache

# Wandb logging
report_to_wandb: true
wandb_project: multi-llm-wagering
wandb_entity: null
wandb_name: equal_wagers_linear_pooling_eval
