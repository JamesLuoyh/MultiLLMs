# Full end-to-end pipeline configuration for weighted score wagers with 1000 samples
# Combines training and evaluation in a single config file

# ============================================================================
# SHARED CONFIGURATION (used by both training and evaluation)
# ============================================================================

# Models (shared between training and evaluation)
_include_models:
  - models/gemma_2_9b_it.yaml
  - models/llama3_aloe_8b_alpha.yaml
  # - models/qwen3_5_9b.yaml
  # - models/llama_2_7b.yaml

# Apply adaptive temperature scaling to cached option logits before wagering.
calibrated: true
_include_calibration: calibration/adaptive_temperature_1000samples.yaml



# Wagering method (must match between training and evaluation)

wagering_method:
  name: router_dc
  config:
    encoder_model_name: microsoft/mdeberta-v3-base
    tokenizer_use_fast: false
    hidden_state_layers: [-1]  # Per-model layer picks, aligned with _include_models order
    max_seq_length: 512
    learning_rate: 1e-6
    lr_decay_factor: 1
    lr_decay_steps: 100
    temperature: 1.0
    grad_clip_norm: 1.0
    weight_decay: 0.01
    freeze_encoder: false
    pubmedqa_strip_context: true
    similarity_function: cos
    top_k: 3
    last_k: 3
    min_pos_p: 0.01
    neg_mask_threshold: 0.5
    device: cuda:0

# Aggregation function (must match between training and evaluation)
aggregation:
  name: weighted_linear_pooling
  config: {}

# Common options
option_tokens: ["A", "B", "C", "D"]

# ============================================================================
# TRAINING CONFIGURATION
# ============================================================================

# Training datasets
_include_datasets:
  - datasets/mmlu_full.yaml
  - datasets/medmcqa.yaml

# Override dataset-specific settings for training
datasets:
  - train_split: auxiliary_train
  - train_split: train

# Training parameters
num_epochs: 50  # Default: 100 epochs
# Base directory for checkpoints (unique subdirectory will be generated)
checkpoint_base_dir: /common/users/yl2310/MultiLLMs/checkpoints
save_every: 100  # Save checkpoint every 100 batches
training_batch_size: 50  # Batch size for training loop (different from batch size for collecting hidden states)
wager_score_plot_every: 500  # Plot wager score distributions every 100 batches (set to None to disable)

# Training options
auto_resume: false  # Automatically resume from latest checkpoint if available
balance_training_datasets: true  # If true, randomly subsample each dataset to min dataset size
shuffle_data: true  # Shuffle training data across datasets
shuffle_seed: 18 #18 #1  # Random seed for shuffling (will be overridden by sweep)
early_stopping_patience: 5
early_stopping_criterion: validation

# Wandb logging
report_to_wandb: true
wandb_project: multi-llm-wagering
wandb_entity: null
wandb_name: router_dc_4models

# ============================================================================
# EVALUATION CONFIGURATION
# ============================================================================

# Checkpoint path will be automatically set to {checkpoint_dir}/final
# But you can override it here if needed
# For testing, this will be set by the pipeline script automatically

# Test datasets
_include_test_datasets:
  - datasets/mmlu_full.yaml
  - datasets/medmcqa.yaml

# Override dataset-specific settings for evaluation
test_datasets:
  - display_name: mmlu_full_test
    eval_split: test
  - display_name: medmcqa_test
    eval_split: validation  # MedMCQA test split has no labels, use validation

# OOD dataset
# Include OOD dataset config
_include_ood_datasets:
  - datasets/arc_challenge.yaml
  - datasets/forecastqa.yaml
# Override OOD dataset-specific settings
ood_datasets:
  - display_name: arc_challenge_ood
    eval_split: test
  - display_name: forecastqa_ood
    eval_split: test

