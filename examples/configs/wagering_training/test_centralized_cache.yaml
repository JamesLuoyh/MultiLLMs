# Test configuration for cache sharing verification - Centralized Wagers
# Uses very small sample sizes (10 samples) for quick testing

_include_models:
  - models/gemma_2_9b_it.yaml
  - models/llama3_aloe_8b_alpha.yaml

wagering_method:
  name: centralized_wagers
  config:
    hidden_dim: 4096
    hidden_layers: [512, 256]
    learning_rate: 1e-5
    temperature: 2.0
    grad_clip_norm: 1.0
    normalize_hidden_states: true
    device: cuda:0

aggregation:
  name: weighted_linear_pooling
  config: {}

option_tokens: ["A", "B", "C", "D"]
cache_path: /common/users/yl2310/MultiLLMs/cache

_include_datasets:
  - datasets/mmlu.yaml

datasets:
  - train_split: train
    size: 10  # Very small for quick testing

num_epochs: 2  # Just 2 epochs for testing
checkpoint_base_dir: /common/users/yl2310/MultiLLMs/test_checkpoints_cache
save_every: 100
training_batch_size: 10

auto_resume: false
shuffle_data: true
shuffle_seed: 42
early_stopping_patience: 10
report_to_wandb: false
