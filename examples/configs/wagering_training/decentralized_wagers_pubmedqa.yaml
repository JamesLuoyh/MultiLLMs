# Full end-to-end pipeline for decentralized per-model routers on PubMedQA
# Structure matches centralized_wagers_pubmedqa.yaml; only wagering_method differs.

# ============================================================================
# SHARED CONFIGURATION (used by both training and evaluation)
# ============================================================================

_include_models:
  - models/llama3_aloe_8b_alpha.yaml
  - models/llama3_aloe_8b_alpha.yaml
  - models/llama3_aloe_8b_alpha.yaml
  - models/llama3_aloe_8b_alpha.yaml

calibrated: false
_include_calibration: calibration/adaptive_temperature_pubmedqa_1000samples.yaml

wagering_method:
  name: decentralized_wagers
  config:
    hidden_dim: 4096
    hidden_layers: [512, 256]
    hidden_state_layers: [-1]
    learning_rate: 5e-6
    lr_decay_factor: 1
    lr_decay_steps: 100
    temperature: 2.0
    grad_clip_norm: 1.0
    normalize_hidden_states: false
    device: cuda:0

aggregation:
  name: weighted_linear_pooling
  config: {}

option_tokens: ["YES", "NO"]
cache_path: /common/users/abcdefg/MultiLLMs/cache

# ============================================================================
# TRAINING CONFIGURATION
# ============================================================================

_include_datasets:
  - datasets/pubmedqa.yaml

num_epochs: 50
checkpoint_base_dir: /common/users/abcdefg/MultiLLMs/checkpoints
save_every: 100
training_batch_size: 100

auto_resume: false
balance_training_datasets: true
shuffle_data: true
shuffle_seed: 18
early_stopping_patience: 5
early_stopping_criterion: validation

report_to_wandb: true
wandb_project: multi-llm-wagering
wandb_entity: null
wandb_name: decentralized_wagers_pubmedqa

# ============================================================================
# EVALUATION CONFIGURATION
# ============================================================================

_include_test_datasets:
  - datasets/pubmedqa.yaml

test_datasets:
  - display_name: pubmedqa_test
