_include_models:
- models/llama3_1_8b_instruct.yaml
- models/llama3_aloe_8b_alpha.yaml
calibrated: false
_include_calibration: calibration/adaptive_temperature_1000samples.yaml
wagering_method:
  name: router_dc
  config:
    encoder_model_name: microsoft/mdeberta-v3-base
    debug_param_dtypes: true
    tokenizer_use_fast: false
    hidden_state_layers:
    - -1
    max_seq_length: 512
    learning_rate: 1e-6
    lr_decay_factor: 1
    lr_decay_steps: 100
    temperature: 1.0
    encoder_lr_mult: 0.01
    grad_clip_norm: 0.5
    max_grad_norm_before_skip: 1000
    weight_decay: 0.01
    freeze_encoder: false
    pubmedqa_strip_context: true
    similarity_function: cos
    top_k: 3
    last_k: 3
    min_pos_p: 0.01
    neg_mask_threshold: 0.5
    device: cuda:0
aggregation:
  name: weighted_linear_pooling
  config: {}
option_tokens:
- A
- B
- C
- D
_include_datasets:
- datasets/medmcqa.yaml
datasets:
- train_split: train
num_epochs: 5
checkpoint_base_dir: /research/projects/ecoai/yl2310/MultiLLMs/checkpoints/router_dc_2models_medmcqa/repeat_0001
save_every: 100
training_batch_size: 50
wager_score_plot_every: 500
auto_resume: false
balance_training_datasets: true
shuffle_data: true
shuffle_seed: 19
early_stopping_patience: 5
early_stopping_criterion: validation
report_to_wandb: false
wandb_project: multi-llm-wagering
wandb_entity: null
wandb_name: router_dc_2models_medmcqa
shared_source_tripartition: true
_include_test_datasets:
- datasets/medmcqa.yaml
test_datasets:
- display_name: medmcqa_test
  eval_split: train
dataset_split_seed: 43
eval_checkpoint_dir: /research/projects/ecoai/yl2310/MultiLLMs/checkpoints/router_dc_2models_medmcqa/repeat_0001/eval
checkpoint_path: /research/projects/ecoai/yl2310/MultiLLMs/checkpoints/router_dc_2models_medmcqa/repeat_0001
