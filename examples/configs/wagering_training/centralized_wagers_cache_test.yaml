    hidden_layers:
    - 512
    - 256
    learning_rate: 1e-4
    device: cuda:0
aggregation:
  name: weighted_linear_pooling
  config: {}
option_tokens:
- A
- B
- C
- D
cache_path: /common/users/yl2310/MultiLLMs/cache
_include_datasets:
- datasets/mmlu.yaml
- datasets/medmcqa.yaml
datasets:
- train_split: train
  size: 10
- train_split: train
